name: Cloom
options:
  bundleIdPrefix: com.cloom
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  Cloom:
    type: application
    platform: macOS
    sources:
      - path: CloomApp/Sources
        excludes:
          - "Bridge/Generated/cloom_coreFFI.h"
          - "Bridge/Generated/cloom_coreFFI.modulemap"
      - path: CloomApp/Resources
        excludes:
          - "Info.plist"
          - "Cloom.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloom.app
        PRODUCT_NAME: Cloom
        INFOPLIST_FILE: CloomApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloomApp/Resources/Cloom.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        OTHER_LDFLAGS:
          - "-lcloom_core"
        SWIFT_OBJC_BRIDGING_HEADER: CloomApp/Sources/Bridge/Cloom-Bridging-Header.h
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
        # LSUIElement is set in Info.plist (menu bar app, no dock icon)
    preBuildScripts:
      - name: "Build Rust & Generate UniFFI Bindings"
        script: |
          cd "${PROJECT_DIR}"
          ./build.sh
        basedOnDependencyAnalysis: false

  CloomTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CloomTests
    dependencies:
      - target: Cloom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloom.app.tests
        GENERATE_INFOPLIST_FILE: YES
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        OTHER_LDFLAGS:
          - "-lcloom_core"
        SWIFT_ENABLE_EXPLICIT_MODULES: NO

  CloomUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CloomUITests
    dependencies:
      - target: Cloom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloom.app.uitests
        GENERATE_INFOPLIST_FILE: YES
