name: Cloom
options:
  bundleIdPrefix: com.cloom
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  Cloom:
    type: application
    platform: macOS
    configFiles:
      Debug: CloomApp/Resources/Secrets.xcconfig
      Release: CloomApp/Resources/Secrets.xcconfig
    sources:
      - path: CloomApp/Sources
        excludes:
          - "Bridge/Generated/cloom_coreFFI.h"
          - "Bridge/Generated/cloom_coreFFI.modulemap"
      - path: CloomApp/Resources
        excludes:
          - "Info.plist"
          - "Cloom.entitlements"
          - "Secrets.xcconfig"
          - "Secrets.xcconfig.example"
    settings:
      base:
        # GOOGLE_CLIENT_ID and GOOGLE_REVERSED_CLIENT_ID are set via Secrets.xcconfig
        # Do NOT define them here — project-level settings override xcconfig values
        PRODUCT_BUNDLE_IDENTIFIER: com.cloom.app
        PRODUCT_NAME: Cloom
        INFOPLIST_FILE: CloomApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloomApp/Resources/Cloom.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        OTHER_LDFLAGS:
          - "-lcloom_core"
        SWIFT_OBJC_BRIDGING_HEADER: CloomApp/Sources/Bridge/Cloom-Bridging-Header.h
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ${APPLE_DEVELOPER_TEAM_ID}
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-Wno-incomplete-umbrella"
        # LSUIElement is set in Info.plist (menu bar app, no dock icon)
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: LaunchAtLogin
      - package: KeyboardShortcuts
      - package: Sparkle
    preBuildScripts:
      - name: "Build Rust & Generate UniFFI Bindings"
        script: |
          cd "${PROJECT_DIR}"
          ./build.sh
        basedOnDependencyAnalysis: false

  CloomTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CloomTests
    dependencies:
      - target: Cloom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloom.app.tests
        GENERATE_INFOPLIST_FILE: YES
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/CloomApp/Sources/Bridge/Generated"
        OTHER_LDFLAGS:
          - "-lcloom_core"
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
