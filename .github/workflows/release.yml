name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cloom-core/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('cloom-core/Cargo.lock') }}
          restore-keys: rust-release-${{ runner.os }}-

      # ── Build Rust + UniFFI bindings ────────────────────────────────
      - name: Build Rust & generate UniFFI bindings
        run: ./build.sh

      # ── Xcode project ──────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen || true

      # ── Stub secrets for CI ─────────────────────────────────────────
      - name: Create Secrets stubs
        run: |
          cp CloomApp/Resources/Secrets.xcconfig.example CloomApp/Resources/Secrets.xcconfig
          cp CloomApp/Sources/Cloud/Secrets.swift.example CloomApp/Sources/Cloud/Secrets.swift

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Extract version from tag ────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      # ── Update Info.plist version ───────────────────────────────────
      - name: Set version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" CloomApp/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.version }}" CloomApp/Resources/Info.plist

      # ── Archive ─────────────────────────────────────────────────────
      - name: Archive Xcode project
        run: |
          xcodebuild archive \
            -scheme Cloom \
            -archivePath build/Cloom.xcarchive \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            -quiet

      # ── Extract & sign ──────────────────────────────────────────────
      - name: Extract and ad-hoc sign app
        run: |
          cp -R build/Cloom.xcarchive/Products/Applications/Cloom.app build/Cloom.app
          codesign --sign - --force --deep build/Cloom.app
          codesign --verify --verbose build/Cloom.app

      # ── Create DMG ──────────────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Cloom" \
            --volicon "CloomApp/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@1x.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Cloom.app" 175 190 \
            --app-drop-link 425 190 \
            --hide-extension "Cloom.app" \
            "build/Cloom-${{ steps.version.outputs.version }}.dmg" \
            "build/Cloom.app" || true

      # ── Compute SHA256 ──────────────────────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "build/Cloom-${{ steps.version.outputs.version }}.dmg" | cut -d ' ' -f 1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      # ── Sign DMG with Sparkle EdDSA ───────────────────────────────
      - name: Sign DMG for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "Warning: SPARKLE_ED_PRIVATE_KEY not set — skipping Sparkle signing."
            echo "signature=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Download Sparkle release to get signing tools
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIGN_TOOL="/tmp/sparkle/bin/sign_update"
          chmod +x "$SIGN_TOOL"

          # Sign using stdin for the private key (recommended by Sparkle)
          SIG=$(echo "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_TOOL" "build/Cloom-${{ steps.version.outputs.version }}.dmg" --ed-key-file - -p)
          echo "signature=$SIG" >> "$GITHUB_OUTPUT"
          echo "EdDSA signature generated"

      # ── Extract changelog for this version ─────────────────────────
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry for this version."
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release-notes.md

      # ── Create GitHub Release ───────────────────────────────────────
      - name: Create GitHub Release
        env:
          RELEASE_NOTES: ""
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          NOTES=$(cat /tmp/release-notes.md)

          BODY=$(cat <<RELEASE_EOF
          ## What's Changed

          ${NOTES}

          ## Installation

          1. Download \`Cloom-${VERSION}.dmg\` below
          2. Open the DMG and drag **Cloom** to your Applications folder
          3. On first launch, right-click the app and select **Open** (Gatekeeper bypass for unsigned apps)

          **Homebrew:**
          \`\`\`bash
          brew tap iamsachin/cloom
          brew install --cask cloom
          \`\`\`

          **SHA256:** \`${SHA}\`

          **System Requirements:** macOS 26.0 (Tahoe) or later, Apple Silicon (arm64)
          RELEASE_EOF
          )

          gh release create "$TAG" \
            --title "Cloom ${TAG}" \
            --notes "$BODY" \
            "build/Cloom-${VERSION}.dmg"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Mark release as prerelease if needed
        if: contains(steps.version.outputs.version, '-')
        run: gh release edit "${{ steps.version.outputs.tag }}" --prerelease
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Update Homebrew tap ─────────────────────────────────────────
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Skipping Homebrew tap update — HOMEBREW_TAP_TOKEN not set."
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Cloom-${VERSION}.dmg"

          CASK_CONTENT=$(cat <<CASK_EOF
          cask "cloom" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${DOWNLOAD_URL}"
            name "Cloom"
            desc "Open-source screen recorder for macOS"
            homepage "https://github.com/${{ github.repository }}"

            depends_on macos: ">= :tahoe"
            depends_on arch: :arm64

            app "Cloom.app"

            zap trash: [
              "~/Library/Application Support/Cloom",
              "~/Library/Preferences/com.cloom.app.plist",
              "~/Library/Caches/com.cloom.app",
            ]
          end
          CASK_EOF
          )

          # Clone the tap repo, update the cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/iamsachin/homebrew-cloom.git" /tmp/homebrew-cloom
          mkdir -p /tmp/homebrew-cloom/Casks
          echo "$CASK_CONTENT" > /tmp/homebrew-cloom/Casks/cloom.rb
          cd /tmp/homebrew-cloom
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cloom.rb
          git diff --cached --quiet && echo "No changes to Homebrew cask" && exit 0
          git commit -m "Update cloom to ${VERSION}"
          git push origin main

      # ── Update Sparkle appcast on gh-pages ────────────────────────
      - name: Update Sparkle appcast
        if: steps.sparkle_sign.outputs.signature != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/Cloom-${VERSION}.dmg"
          ED_SIG="${{ steps.sparkle_sign.outputs.signature }}"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")

          # Clone gh-pages branch (or create it)
          git clone --branch gh-pages "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" /tmp/gh-pages 2>/dev/null || {
            mkdir -p /tmp/gh-pages
            cd /tmp/gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            cd -
          }

          # Generate/update appcast.xml
          ./scripts/generate-appcast.sh "$VERSION" "$DMG_PATH" "$ED_SIG" "$DMG_SIZE" /tmp/gh-pages

          # Push to gh-pages
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" && exit 0
          git commit -m "Update appcast for v${VERSION}"
          git push origin gh-pages
